---
- name: Bootstrap Ubuntu nodes for k3s
  hosts: k3s_cluster
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required base packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap permanently in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load overlay kernel module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter kernel module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Persist Kubernetes kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Configure Kubernetes networking sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
      notify: Reload sysctl

    - name: Start qemu guest agent if available
      ansible.builtin.systemd:
        name: qemu-guest-agent
        state: started
      failed_when: false

  handlers:
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true
