---
- name: Install and bootstrap FluxCD
  hosts: k3s_control
  become: true
  gather_facts: false

  vars_files:
    - ../inventory/group_vars/flux.yml

  vars:
    flux_install_script: /tmp/install-flux.sh

  tasks:
    - name: Check that GitHub token was provided
      ansible.builtin.assert:
        that:
          - github_token is defined
          - github_token | length > 0
        fail_msg: >
          Missing GitHub token. Run this playbook with:
          ansible-playbook playbooks/install-flux.yml -e github_token='YOUR_TOKEN'

    - name: Download Flux install script
      ansible.builtin.get_url:
        url: https://fluxcd.io/install.sh
        dest: "{{ flux_install_script }}"
        mode: "0755"

    - name: Install Flux CLI
      ansible.builtin.command: "{{ flux_install_script }}"
      args:
        creates: /usr/local/bin/flux

    - name: Check Flux version
      ansible.builtin.command: flux --version
      changed_when: false
      register: flux_version

    - name: Display Flux version
      ansible.builtin.debug:
        var: flux_version.stdout

    - name: Check k3s cluster access
      ansible.builtin.command: k3s kubectl get nodes
      changed_when: false

    - name: Run Flux pre-check
      ansible.builtin.command: flux check --pre
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Bootstrap Flux with GitHub
      ansible.builtin.command: >
        flux bootstrap github
        --owner={{ flux_github_owner }}
        --repository={{ flux_github_repository }}
        --branch={{ flux_github_branch }}
        --path={{ flux_cluster_path }}
        {% if flux_personal_repo | bool %}--personal{% endif %}
        {% if flux_token_auth | bool %}--token-auth{% endif %}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        GITHUB_TOKEN: "{{ github_token }}"
      no_log: true

    - name: Show Flux Git sources
      ansible.builtin.command: flux get sources git
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      register: flux_sources

    - name: Display Flux Git sources
      ansible.builtin.debug:
        var: flux_sources.stdout_lines

    - name: Show Flux kustomizations
      ansible.builtin.command: flux get kustomizations
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      register: flux_kustomizations

    - name: Display Flux kustomizations
      ansible.builtin.debug:
        var: flux_kustomizations.stdout_lines
