---
- name: Configure cert-manager secrets
  hosts: k3s_control
  become: true
  gather_facts: false

  tasks:
    - name: Check that Cloudflare API token was provided
      ansible.builtin.assert:
        that:
          - cloudflare_api_token is defined
          - cloudflare_api_token | length > 0
        fail_msg: |
          Missing Cloudflare API token.
          Run with:
          ansible-playbook playbooks/configure-cert-manager-secrets.yml -e cloudflare_api_token='YOUR_TOKEN'

    - name: Wait for cert-manager namespace
      ansible.builtin.command: k3s kubectl get namespace cert-manager
      register: cert_manager_namespace
      changed_when: false
      retries: 30
      delay: 5
      until: cert_manager_namespace.rc == 0

    - name: Create or update Cloudflare API token secret
      ansible.builtin.shell: |
        k3s kubectl create secret generic cloudflare-api-token-secret \
          --namespace cert-manager \
          --from-literal=api-token='{{ cloudflare_api_token }}' \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: true
      no_log: true

    - name: Verify Cloudflare API token secret exists
      ansible.builtin.command: >
        k3s kubectl get secret cloudflare-api-token-secret
        -n cert-manager
      changed_when: false
