---
- name: Check k3s cluster status
  hosts: k3s_control
  become: true
  gather_facts: false

  tasks:
    - name: Show nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      changed_when: false
      register: nodes

    - name: Display nodes
      ansible.builtin.debug:
        var: nodes.stdout_lines

    - name: Show pods across all namespaces
      ansible.builtin.command: k3s kubectl get pods -A -o wide
      changed_when: false
      register: pods

    - name: Display pods
      ansible.builtin.debug:
        var: pods.stdout_lines

    - name: Show services across all namespaces
      ansible.builtin.command: k3s kubectl get svc -A
      changed_when: false
      register: services

    - name: Display services
      ansible.builtin.debug:
        var: services.stdout_lines
