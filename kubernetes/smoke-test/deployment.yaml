apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-smoke-test
  namespace: smoke-test
  labels:
    app.kubernetes.io/name: nginx-smoke-test
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-smoke-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-smoke-test
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
